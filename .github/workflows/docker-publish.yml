# ACP Relay — Docker image publish to GitHub Container Registry (GHCR)
#
# Triggers:
#   - Push to main (publishes :latest + :full)
#   - Tag push vX.Y.Z (publishes :vX.Y.Z + :X.Y.Z + :latest)
#   - Manual dispatch (workflow_dispatch)
#
# Images published:
#   ghcr.io/kickflip73/agent-communication-protocol/acp-relay:latest   (base)
#   ghcr.io/kickflip73/agent-communication-protocol/acp-relay:full     (with websockets+cryptography)
#   ghcr.io/kickflip73/agent-communication-protocol/acp-relay:vX.Y.Z  (on tag)

name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Lowercase is required for Docker image names; set statically to avoid case issues
  IMAGE_NAME: kickflip73/agent-communication-protocol/acp-relay

jobs:
  build-and-push:
    name: Build & Push (${{ matrix.variant }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - variant: base
            extras: base
            tag_suffix: ""          # :latest / :vX.Y.Z
          - variant: full
            extras: full
            tag_suffix: "-full"     # :full / :vX.Y.Z-full

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=${{ matrix.tag_suffix }}
          tags: |
            # On tag push: vX.Y.Z and X.Y.Z
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            # On main push: latest
            type=raw,value=latest,enable={{is_default_branch}}
            # Always include short SHA for traceability
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            EXTRAS=${{ matrix.extras }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # Smoke-test: pull the just-published image and check AgentCard endpoint
  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Pull and run acp-relay:latest
        run: |
          docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest
          # WS port = 8000, HTTP interface port = WS + 100 = 8100
          docker run -d --name acp-smoke \
            -p 8000:8000 -p 8100:8100 \
            ghcr.io/${{ env.IMAGE_NAME }}:latest \
            --name SmokeTest --port 8000
          # Wait for relay to start (retry up to 15s)
          for i in $(seq 1 15); do
            sleep 1
            if curl -sf http://localhost:8100/.well-known/acp.json > /dev/null 2>&1; then
              echo "Relay ready after ${i}s"
              break
            fi
            echo "Waiting... (${i}s)"
          done
          docker logs acp-smoke || true

      - name: Check /.well-known/acp.json
        run: |
          CARD=$(curl -sf http://localhost:8100/.well-known/acp.json)
          echo "Card response: $CARD"
          echo "$CARD" | python3 -c "
          import sys, json
          raw = sys.stdin.read().strip()
          if not raw:
              print('ERROR: empty response from /.well-known/acp.json')
              sys.exit(1)
          card = json.loads(raw)
          # AgentCard: fields are under 'self' sub-object
          info = card.get('self', card)
          name = info.get('name', '')
          assert name == 'SmokeTest', f'Unexpected name={name!r}, card={card}'
          print(f'✅ Smoke test PASS — name={name}')
          "

      - name: Cleanup
        if: always()
        run: docker rm -f acp-smoke || true
