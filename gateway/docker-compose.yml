version: "3.9"

services:
  acp-gateway:
    build: .
    ports:
      - "8765:8765"
    environment:
      - ACP_LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/acp/v1/health')"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Optional: Redis-backed message store for production
  # redis:
  #   image: redis:7-alpine
  #   ports: ["6379:6379"]
